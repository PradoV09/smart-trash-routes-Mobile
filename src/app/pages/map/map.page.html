<div style="position: relative; width: 100%; height: 100vh;">

  <!-- Mapa -->
  <div #mapElement style="position: absolute; top: 0; left: 0; right: 0; bottom: 0;"></div>

  <!-- Loader -->
  <div *ngIf="mapLoading" style="
    position: absolute; inset: 0;
    background: #001D39;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 2000;
  ">
    <img src="assets/icon/logo.png" style="width: 90px; margin-bottom: 24px; opacity: 0.9;">
    <div style="
      width: 40px; height: 40px;
      border: 3px solid rgba(123,189,232,0.3);
      border-top-color: #7BBDE8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    "></div>
    <p style="color: #7BBDE8; margin-top: 16px; font-size: 0.9rem; font-weight: 600;">
      Cargando mapa...
    </p>
  </div>

  <!-- Header flotante -->
  <div style="
    position: absolute; top: 16px; left: 16px; right: 16px;
    display: flex; align-items: center; gap: 10px;
    z-index: 1000;
  ">
    <button (click)="goBack()" style="
      width: 42px; height: 42px;
      background: white; border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; flex-shrink: 0;
    ">
      <ion-icon name="arrow-back-outline" style="font-size: 20px; color: #001D39;"></ion-icon>
    </button>

    <!-- Barra búsqueda -->
    <div *ngIf="searchVisible" style="flex: 1; display: flex; gap: 8px;">
      <input
        [(ngModel)]="searchQuery"
        (keyup.enter)="searchPlace()"
        placeholder="Buscar lugar..."
        style="
          flex: 1; padding: 10px 14px;
          border-radius: 12px; border: none;
          background: white; font-size: 0.9rem;
          box-shadow: 0 4px 15px rgba(0,0,0,0.2);
          outline: none; color: #001D39;
        ">
      <button (click)="searchPlace()" style="
        width: 42px; height: 42px; flex-shrink: 0;
        background: #0A4174; border: none; border-radius: 12px;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
      ">
        <ion-icon name="search-outline" style="font-size: 18px; color: white;"></ion-icon>
      </button>
    </div>

    <!-- Info ruta -->
    <div *ngIf="!searchVisible" style="
      flex: 1; background: white; border-radius: 12px;
      padding: 10px 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    ">
      <p style="margin: 0; font-size: 0.8rem; color: #49769F; font-weight: 600;">RUTA ASIGNADA</p>
      <p style="margin: 0; font-size: 0.95rem; font-weight: 700; color: #001D39;">
        {{ rutaNombre || 'Sin ruta activa' }}
      </p>
    </div>

    <button (click)="toggleSearch()" style="
      width: 42px; height: 42px; flex-shrink: 0;
      background: white; border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
    ">
      <ion-icon [name]="searchVisible ? 'close-outline' : 'search-outline'" style="font-size: 20px; color: #001D39;"></ion-icon>
    </button>

    <button (click)="toggleMapTheme()" style="
      width: 42px; height: 42px; flex-shrink: 0;
      background: white; border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer;
    ">
      <ion-icon [name]="isDark ? 'sunny-outline' : 'moon-outline'" style="font-size: 20px; color: #001D39;"></ion-icon>
    </button>
  </div>

  <!-- Leyenda -->
  <div *ngIf="tieneRutaAsignada && !mapLoading" style="
    position: absolute; top: 80px; left: 16px;
    background: white; border-radius: 12px; padding: 10px 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 1000;
    display: flex; flex-direction: column; gap: 6px;
  ">
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 22px; height: 3px; background: #0A4174; border-radius: 2px; border-top: 2px dashed #0A4174;"></div>
      <span style="font-size: 0.72rem; color: #49769F; font-weight: 600;">Ruta asignada</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 22px; height: 3px; background: #10B981; border-radius: 2px;"></div>
      <span style="font-size: 0.72rem; color: #49769F; font-weight: 600;">Recorrido real</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 22px; height: 3px; background: #F59E0B; border-radius: 2px; border-top: 2px dashed #F59E0B;"></div>
      <span style="font-size: 0.72rem; color: #49769F; font-weight: 600;">Guía al inicio</span>
    </div>
  </div>

  <!-- Botones laterales derecha -->
  <div style="
    position: absolute; bottom: 100px; right: 16px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 1000;
  ">
    <!-- Reportar (solo si ruta en curso) -->
    <button *ngIf="rutaEnCurso || tieneRutaAsignada" (click)="abrirReporte()" style="
      width: 50px; height: 50px;
      background: #3b0a0a; border: none; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(59,10,10,0.4); cursor: pointer;
    ">
      <ion-icon name="alert-outline" style="font-size: 22px; color: #fca5a5;"></ion-icon>
    </button>

    <!-- Mi ubicación -->
    <button (click)="goToMyLocation()" style="
      width: 50px; height: 50px;
      background: #0A4174; border: none; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(10,65,116,0.4); cursor: pointer;
    ">
      <ion-icon name="locate-outline" style="font-size: 24px; color: white;"></ion-icon>
    </button>

    <!-- Ir al inicio de ruta -->
    <button *ngIf="tieneRutaAsignada" (click)="irAlInicioDeRuta()" style="
      width: 50px; height: 50px;
      background: #10B981; border: none; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(16,185,129,0.4); cursor: pointer;
    ">
      <ion-icon name="flag-outline" style="font-size: 22px; color: white;"></ion-icon>
    </button>
  </div>

  <!-- Panel inferior info -->
  <div *ngIf="routeInfo" style="
    position: absolute; bottom: 16px; left: 16px; right: 16px;
    background: #001D39; border-radius: 14px; padding: 14px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 1000;
    display: flex; align-items: center; gap: 10px;
  ">
    <ion-icon name="navigate-outline" style="color: #7BBDE8; font-size: 20px; flex-shrink: 0;"></ion-icon>
    <p style="margin: 0; font-size: 0.9rem; font-weight: 600; color: white;">{{ routeInfo }}</p>
  </div>

  <!-- Panel coordenadas -->
  <div *ngIf="coordsInfo && !routeInfo" style="
    position: absolute; bottom: 16px; left: 16px; right: 76px;
    background: white; border-radius: 14px; padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000;
  ">
    <p style="margin: 0; font-size: 0.75rem; color: #49769F; font-weight: 600;">COORDENADAS</p>
    <p style="margin: 0; font-size: 0.9rem; font-weight: 700; color: #001D39;">{{ coordsInfo }}</p>
  </div>

  <!-- Modal reporte -->
  <app-reporte-modal
    *ngIf="mostrarReporte"
    [idAsignacion]="asignacionActivaId"
    (cerrar)="onReporteCerrado()"
    (enviado)="onReporteEnviado()">
  </app-reporte-modal>

</div>
