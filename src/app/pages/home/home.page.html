<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <div style="background: #0F1923; min-height: 100vh; padding: 16px 16px 32px;">

    <!-- TOPBAR -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
      <div>
        <h1 style="color: white; font-weight: 700; font-size: 18px; margin: 0;">
          Mis asignaciones
        </h1>
        <p style="margin: 4px 0 0; color: #8A9BBE; font-size: 13px;">
          {{ currentDate }} · {{ total }} ruta{{ total !== 1 ? 's' : '' }}
        </p>
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <button (click)="logout()" style="
          width: 34px; height: 34px;
          background: #3b0a0a;
          border: none;
          border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          cursor: pointer;
        ">
          <ion-icon name="log-out-outline" style="font-size: 18px; color: #fca5a5;"></ion-icon>
        </button>
      </div>
    </div>

    <!-- KPI CARDS -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px;">
      <div style="background: #1A2535; border-radius: 10px; padding: 10px 12px; text-align: center;">
        <p style="margin: 0; font-size: 24px; font-weight: 700; color: #10B981;">{{ completadas }}</p>
        <p style="margin: 4px 0 0; font-size: 11px; color: #8A9BBE; text-transform: uppercase;">Completadas</p>
      </div>
      <div style="background: #1A2535; border-radius: 10px; padding: 10px 12px; text-align: center;">
        <p style="margin: 0; font-size: 24px; font-weight: 700; color: #F59E0B;">{{ pendientes }}</p>
        <p style="margin: 4px 0 0; font-size: 11px; color: #8A9BBE; text-transform: uppercase;">Pendientes</p>
      </div>
      <div style="background: #1A2535; border-radius: 10px; padding: 10px 12px; text-align: center;">
        <p style="margin: 0; font-size: 24px; font-weight: 700; color: white;">{{ total }}</p>
        <p style="margin: 4px 0 0; font-size: 11px; color: #8A9BBE; text-transform: uppercase;">Total</p>
      </div>
    </div>

    <!-- Skeletons (Loading state) -->
    <div *ngIf="isInitialLoading" style="display: flex; flex-direction: column; gap: 16px;">
      <app-skeleton-card *ngFor="let i of [1,2,3]"></app-skeleton-card>
    </div>

    <!-- Vacío -->
    <div *ngIf="asignaciones.length === 0 && !loading && !isInitialLoading"
         style="text-align: center; padding: 48px 24px; background: #1A2535; border-radius: 20px; border: 0.5px solid #2A3A50;">
      <ion-icon name="clipboard-outline" style="font-size: 48px; color: #8A9BBE; margin-bottom: 12px; display: block;"></ion-icon>
      <p style="margin: 0; color: #8A9BBE; font-size: 1rem; font-weight: 600;">
        No tienes asignaciones registradas
      </p>
    </div>

    <!-- PENDIENTE HOY -->
    <div *ngIf="asignacionesPendientes.length > 0">
      <p style="margin: 0 0 12px; font-size: 11px; color: #8A9BBE; text-transform: uppercase; font-weight: 600; letter-spacing: 0.04em;">
        Pendiente hoy
      </p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <app-asignacion-card
          *ngFor="let asignacion of asignacionesPendientes"
          [asignacion]="asignacion"
          (iniciar)="handleIniciar($event)"
          (finalizar)="handleFinalizar($event)">
        </app-asignacion-card>
      </div>
    </div>

    <!-- COMPLETADAS -->
    <div *ngIf="asignacionesCompletadas.length > 0" style="margin-top: 24px;">
      <p style="margin: 0 0 12px; font-size: 11px; color: #8A9BBE; text-transform: uppercase; font-weight: 600; letter-spacing: 0.04em;">
        Completadas
      </p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <app-asignacion-card
          *ngFor="let asignacion of asignacionesCompletadas"
          [asignacion]="asignacion"
          (iniciar)="handleIniciar($event)"
          (finalizar)="handleFinalizar($event)">
        </app-asignacion-card>
      </div>
    </div>

  </div>

  <!-- Loading overlay -->
  <div *ngIf="loading" class="modal-overlay">
    <div style="background: #1A2535; padding: 24px 40px; border-radius: 16px; display: flex; align-items: center; gap: 14px; border: 0.5px solid #2A3A50;">
      <div class="loader-primary"></div>
      <span style="color: white; font-weight: 600;">Procesando...</span>
    </div>
  </div>

</ion-content>
