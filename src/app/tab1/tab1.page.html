<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      Smart Trash Routes
    </ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-title size="small">Hola, Carlos Rodríguez</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <ion-card-title style="font-size: 1.1rem; font-weight: 700;">Ruta activa</ion-card-title>
        <ion-badge color="primary">En Ruta</ion-badge>
      </div>
    </ion-card-header>
    <ion-card-content>
      <p style="color: var(--ion-text-color); font-weight: 600;">5/32 paradas · 2h 30min</p>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-list-header>
      <ion-label style="font-weight: 700; color: var(--ion-color-primary);">Próximas Paradas</ion-label>
    </ion-list-header>

    <ion-item-sliding>
      <ion-item>
        <ion-label>
          <h2 style="font-weight: 600;">Calle Principal 123</h2>
          <p>2 contenedores</p>
        </ion-label>
        <ion-badge slot="end" color="success">OK</ion-badge>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="success" (click)="completarParada(1)">Completar</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

    <ion-item-sliding>
      <ion-item>
        <ion-label>
          <h2 style="font-weight: 600;">Av. Libertad 456</h2>
          <p>3 contenedores</p>
        </ion-label>
        <ion-badge slot="end" color="warning">Pendiente</ion-badge>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="success" (click)="completarParada(2)">Completar</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

    <ion-item-sliding>
      <ion-item>
        <ion-label>
          <h2 style="font-weight: 600;">Plaza Mayor 78</h2>
          <p>1 contenedor</p>
        </ion-label>
        <ion-badge slot="end" color="danger">Error</ion-badge>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="success" (click)="completarParada(3)">Completar</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div style="padding: 16px;">
    <ion-button expand="full" color="primary" (click)="iniciarRuta()" style="height: 50px; font-weight: 700;">
      INICIAR RUTA
    </ion-button>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="danger" (click)="emergencia()">
      <ion-icon name="call-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
