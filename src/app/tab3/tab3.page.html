<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      Resumen Diario
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div style="padding: 16px;">
    <ion-label style="font-weight: 700; margin-bottom: 8px; display: block;">PROGRESO DE LA RUTA</ion-label>
    <ion-progress-bar [value]="0.85" color="primary" style="height: 12px; border-radius: 6px;"></ion-progress-bar>
    <p style="text-align: right; font-size: 0.9rem; margin-top: 4px; font-weight: 600;">85% Completado</p>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="4">
        <ion-card style="margin: 4px; text-align: center;">
          <ion-card-header style="padding: 12px 8px;">
            <ion-card-subtitle style="font-size: 0.7rem;">HECHO</ion-card-subtitle>
            <ion-card-title style="font-size: 1.2rem; color: var(--ion-color-success);">27</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
      <ion-col size="4">
        <ion-card style="margin: 4px; text-align: center;">
          <ion-card-header style="padding: 12px 8px;">
            <ion-card-subtitle style="font-size: 0.7rem;">PEND.</ion-card-subtitle>
            <ion-card-title style="font-size: 1.2rem; color: var(--ion-color-warning);">5</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
      <ion-col size="4">
        <ion-card style="margin: 4px; text-align: center;">
          <ion-card-header style="padding: 12px 8px;">
            <ion-card-subtitle style="font-size: 0.7rem;">INCID.</ion-card-subtitle>
            <ion-card-title style="font-size: 1.2rem; color: var(--ion-color-danger);">2</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <div style="padding: 16px; margin-top: 24px;">
    <ion-button expand="full" color="primary" (click)="finalizarTurno()" style="height: 50px; font-weight: 700;">
      FINALIZAR TURNO
    </ion-button>
  </div>
</ion-content>
